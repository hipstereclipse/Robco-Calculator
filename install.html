<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RobCo Calculator Installer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap" rel="stylesheet">
  <style>
    :root {
      color-scheme: dark;
      --bg: #05100a;
      --panel: #08160d;
      --panel-2: #0c2014;
      --phos: #46ff8c;
      --phos-soft: #33d873;
      --phos-dim: #1f9050;
      --amber: #ffc24b;
      --danger: #ff6f57;
      --line: rgba(70, 255, 140, 0.34);
      --line-strong: rgba(70, 255, 140, 0.62);
      --glow: 0 0 4px rgba(70, 255, 140, 0.45);
      --mono: "Share Tech Mono", ui-monospace, "Courier New", monospace;
      --display: "VT323", "Share Tech Mono", monospace;
    }

    * {
      box-sizing: border-box;
    }

    html {
      background: var(--bg);
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(120% 90% at 50% -10%, rgba(70, 255, 140, 0.10), transparent 60%),
        radial-gradient(140% 120% at 50% 120%, rgba(70, 255, 140, 0.06), transparent 55%),
        var(--bg);
      color: var(--phos-soft);
      font-family: var(--mono);
      line-height: 1.5;
      letter-spacing: 0.02em;
      text-shadow: var(--glow);
    }

    /* CRT scanlines + edge vignette / flicker */
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      z-index: 9999;
      pointer-events: none;
      background: repeating-linear-gradient(to bottom,
        rgba(0, 0, 0, 0) 0,
        rgba(0, 0, 0, 0) 2px,
        rgba(0, 0, 0, 0.16) 3px,
        rgba(0, 0, 0, 0) 4px);
      mix-blend-mode: multiply;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: 9998;
      pointer-events: none;
      background: radial-gradient(120% 120% at 50% 50%, transparent 58%, rgba(0, 0, 0, 0.5) 100%);
      animation: flicker 6s infinite steps(60);
    }

    @keyframes flicker {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 0.62; }
    }

    button,
    input {
      font: inherit;
      color: inherit;
    }

    button {
      min-height: 44px;
      border: 1px solid var(--line-strong);
      border-radius: 2px;
      padding: 0 18px;
      background: transparent;
      color: var(--phos);
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      text-shadow: var(--glow);
      transition: background 0.12s, color 0.12s, box-shadow 0.12s;
    }

    button:hover:not(:disabled) {
      background: var(--phos);
      color: #04160b;
      text-shadow: none;
      box-shadow: 0 0 12px rgba(70, 255, 140, 0.55);
    }

    button:focus-visible,
    input:focus-visible {
      outline: 2px solid var(--amber);
      outline-offset: 2px;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.4;
    }

    .shell {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0;
    }

    .topline {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 18px;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--line);
    }

    .brand {
      min-width: 0;
    }

    .eyebrow {
      margin: 0 0 6px;
      color: var(--phos-dim);
      font-size: 0.8rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    h1,
    h2,
    h3,
    p {
      margin: 0;
    }

    h1 {
      font-family: var(--display);
      font-size: clamp(2.4rem, 6vw, 5rem);
      line-height: 0.9;
      color: var(--phos);
      letter-spacing: 0.04em;
      text-shadow: 0 0 10px rgba(70, 255, 140, 0.55);
    }

    h1::after {
      content: "\2588";
      margin-left: 0.12em;
      animation: cursor 1.1s steps(1) infinite;
    }

    @keyframes cursor {
      50% { opacity: 0; }
    }

    .source-pill {
      max-width: 100%;
      border: 1px solid var(--line);
      border-radius: 2px;
      padding: 8px 10px;
      background: var(--panel-2);
      color: var(--phos-dim);
      font-size: 0.85rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(320px, 420px);
      gap: 18px;
      align-items: start;
    }

    .installer,
    .preview {
      position: relative;
      border: 1px solid var(--line);
      border-radius: 2px;
      background-color: var(--panel);
      box-shadow: inset 0 0 0 1px rgba(70, 255, 140, 0.06), 0 0 24px rgba(0, 0, 0, 0.5);
      overflow: hidden;
    }

    /* glowing corner brackets, like the calculator's framed screens */
    .frame {
      --bs: 20px;
      --bt: 2px;
      --bc: var(--phos);
      background-image:
        linear-gradient(var(--bc), var(--bc)),
        linear-gradient(var(--bc), var(--bc)),
        linear-gradient(var(--bc), var(--bc)),
        linear-gradient(var(--bc), var(--bc)),
        linear-gradient(var(--bc), var(--bc)),
        linear-gradient(var(--bc), var(--bc)),
        linear-gradient(var(--bc), var(--bc)),
        linear-gradient(var(--bc), var(--bc));
      background-repeat: no-repeat;
      background-size:
        var(--bs) var(--bt), var(--bs) var(--bt), var(--bs) var(--bt), var(--bs) var(--bt),
        var(--bt) var(--bs), var(--bt) var(--bs), var(--bt) var(--bs), var(--bt) var(--bs);
      background-position:
        left 7px top 7px, right 7px top 7px, left 7px bottom 7px, right 7px bottom 7px,
        left 7px top 7px, right 7px top 7px, left 7px bottom 7px, right 7px bottom 7px;
    }

    .installer {
      min-width: 0;
    }

    .section-head {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      padding: 16px 18px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(70, 255, 140, 0.08), transparent);
    }

    .section-head h2 {
      font-family: var(--display);
      font-size: 1.5rem;
      color: var(--phos);
      letter-spacing: 0.06em;
    }

    .status {
      color: var(--phos-dim);
      font-size: 0.9rem;
    }

    .controls {
      display: grid;
      gap: 16px;
      padding: 18px;
    }

    .target-row,
    .action-row {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .action-row button {
      min-width: 140px;
    }

    .selected-target {
      min-width: min(100%, 240px);
      border: 1px dashed var(--line);
      border-radius: 2px;
      padding: 10px 12px;
      background: var(--panel-2);
      color: var(--phos-dim);
      overflow-wrap: anywhere;
    }

    .ref-field {
      display: grid;
      gap: 6px;
      max-width: 320px;
    }

    .ref-field label {
      color: var(--phos-dim);
      font-size: 0.78rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .ref-field input {
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 2px;
      padding: 0 12px;
      background: #03100a;
      color: var(--phos);
    }

    .ref-field input:hover {
      border-color: var(--line-strong);
    }

    .payload {
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(70, 255, 140, 0.05), transparent);
      padding: 18px;
    }

    .payload h3 {
      margin-bottom: 12px;
      font-family: var(--display);
      font-size: 1.2rem;
      color: var(--phos);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .file-list {
      display: grid;
      gap: 6px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .file-list li {
      border: 1px solid var(--line);
      border-left: 3px solid var(--phos-dim);
      border-radius: 2px;
      padding: 8px 10px;
      background: var(--panel-2);
      color: var(--phos-soft);
      font-size: 0.85rem;
      overflow-wrap: anywhere;
    }

    .file-list li::before {
      content: "\25B8 ";
      color: var(--phos-dim);
    }

    .progress {
      height: 14px;
      border: 1px solid var(--line);
      border-radius: 2px;
      overflow: hidden;
      background: repeating-linear-gradient(90deg,
        #03100a 0, #03100a 6px,
        #061a0f 6px, #061a0f 12px);
    }

    .progress-bar {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, var(--phos-dim), var(--phos), var(--amber));
      box-shadow: 0 0 10px rgba(70, 255, 140, 0.6);
      transition: width 160ms ease;
    }

    .log {
      display: grid;
      gap: 6px;
      min-height: 116px;
      max-height: 260px;
      margin: 0;
      padding: 0;
      overflow: auto;
      list-style: none;
      color: var(--phos-dim);
      font-size: 0.9rem;
    }

    .log li {
      border-left: 3px solid var(--line);
      padding: 2px 0 2px 10px;
    }

    .log li::before {
      content: "> ";
      color: var(--phos-dim);
    }

    .log li.ok {
      border-color: var(--phos);
      color: var(--phos-soft);
    }

    .log li.ok::before {
      content: "+ ";
      color: var(--phos);
    }

    .log li.warn {
      border-color: var(--amber);
      color: var(--amber);
    }

    .log li.warn::before {
      content: "! ";
      color: var(--amber);
    }

    .log li.error {
      border-color: var(--danger);
      color: var(--danger);
    }

    .log li.error::before {
      content: "x ";
      color: var(--danger);
    }

    .preview {
      display: grid;
      gap: 0;
    }

    .preview img {
      display: block;
      width: 100%;
      height: auto;
      background: #02110a;
      filter: saturate(0.85) brightness(0.96);
    }

    .preview-meta {
      padding: 14px 16px;
      border-top: 1px solid var(--line);
      color: var(--phos-dim);
      font-size: 0.9rem;
    }

    .preview-meta strong {
      display: block;
      color: var(--phos);
      font-family: var(--display);
      font-size: 1.25rem;
      letter-spacing: 0.05em;
    }

    @media (max-width: 860px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .topline,
      .section-head {
        align-items: stretch;
        flex-direction: column;
      }

      .source-pill {
        white-space: normal;
      }
    }

    @media (max-width: 560px) {
      .shell {
        width: min(100% - 20px, 1120px);
        padding: 16px 0;
      }

      .target-row button,
      .action-row button,
      .selected-target,
      .ref-field {
        width: 100%;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      body::before { animation: none; }
      h1::after { animation: none; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header class="topline">
      <div class="brand">
        <p class="eyebrow">RobCo (R) TermLink &mdash; Pip-OS Application Loader</p>
        <h1>RobCo Calculator</h1>
      </div>
      <div class="source-pill" id="sourceLabel">Source: GitHub main</div>
    </header>

    <div class="layout">
      <section class="installer frame" aria-labelledby="installerTitle">
        <div class="section-head">
          <div>
            <h2 id="installerTitle">&gt;&gt; microSD INSTALL</h2>
            <p class="status" id="appStatus">Loading manifest...</p>
          </div>
          <div class="ref-field">
            <label for="refInput">Git ref</label>
            <input id="refInput" type="text" value="main" autocomplete="off" spellcheck="false">
          </div>
        </div>

        <div class="controls">
          <div class="target-row">
            <button type="button" id="selectTarget">Select microSD Root</button>
            <div class="selected-target" id="targetLabel">No target selected</div>
          </div>

          <div class="action-row">
            <button type="button" id="installButton" disabled>Install</button>
            <p class="status" id="installStatus">Waiting for target</p>
          </div>

          <div class="progress" aria-hidden="true">
            <div class="progress-bar" id="progressBar"></div>
          </div>
        </div>

        <div class="payload">
          <h3>&gt;&gt; Payload Manifest</h3>
          <ul class="file-list" id="fileList"></ul>
        </div>

        <div class="controls">
          <ol class="log" id="log"></ol>
        </div>
      </section>

      <aside class="preview frame" aria-label="RobCo Calculator preview">
        <img src="./screenshots/preview-contact-sheet.png" alt="RobCo Calculator screen previews" width="828" height="1580" loading="lazy" decoding="async">
        <div class="preview-meta">
          <strong>Engineer's Calc</strong>
          APPS/PIPCALC.JS + 5 mode modules plus APPINFO/CALC.info
        </div>
      </aside>
    </div>
  </main>

  <script>
    "use strict";

    const REPOSITORY = "hipstereclipse/Robco-Calculator";
    const DEFAULT_REF = "main";
    const INFO_PATH = "APPINFO/CALC.info";
    const FALLBACK_PAYLOAD = ["APPS/PIPCALC.JS", "APPS/PCONV.JS", "APPS/PCONST.JS", "APPS/PREF.JS", "APPS/PCIRC.JS", "APPS/PVAC.JS", "APPINFO/CALC.info"];

    const sourceLabel = document.getElementById("sourceLabel");
    const appStatus = document.getElementById("appStatus");
    const installStatus = document.getElementById("installStatus");
    const refInput = document.getElementById("refInput");
    const selectTarget = document.getElementById("selectTarget");
    const installButton = document.getElementById("installButton");
    const targetLabel = document.getElementById("targetLabel");
    const fileList = document.getElementById("fileList");
    const progressBar = document.getElementById("progressBar");
    const logList = document.getElementById("log");

    let targetDirectory = null;
    let payloadFiles = FALLBACK_PAYLOAD.slice();
    let appInfo = null;
    let busy = false;

    init();

    function init() {
      const refParam = new URLSearchParams(window.location.search).get("ref");
      refInput.value = cleanRef(refParam || DEFAULT_REF);
      renderSource();
      renderPayload();
      bindEvents();
      loadManifest().catch((error) => {
        useFallbackPayload(error);
      });
      updateInstallState();
    }

    function bindEvents() {
      refInput.addEventListener("change", () => {
        refInput.value = cleanRef(refInput.value || DEFAULT_REF);
        renderSource();
        loadManifest().catch((error) => {
          useFallbackPayload(error);
        });
      });

      selectTarget.addEventListener("click", selectInstallTarget);
      installButton.addEventListener("click", installApp);
    }

    function cleanRef(value) {
      return String(value).trim().replace(/^\/+|\/+$/g, "") || DEFAULT_REF;
    }

    function getRef() {
      return cleanRef(refInput.value);
    }

    function renderSource() {
      sourceLabel.textContent = "Source: github.com/" + REPOSITORY + " @ " + getRef();
    }

    function rawUrl(path) {
      return "https://raw.githubusercontent.com/" + REPOSITORY + "/" + encodeURIComponent(getRef()) + "/" + path;
    }

    function renderPayload() {
      fileList.replaceChildren();
      payloadFiles.forEach((path) => {
        const item = document.createElement("li");
        item.textContent = path;
        fileList.appendChild(item);
      });
    }

    async function loadManifest() {
      appInfo = null;
      appStatus.textContent = "Loading manifest...";
      const response = await fetch(rawUrl(INFO_PATH), { cache: "no-store" });
      if (!response.ok) {
        throw new Error("Manifest unavailable: " + response.status + " " + response.statusText);
      }

      const text = await response.text();
      appInfo = JSON.parse(text);
      const files = String(appInfo.files || "")
        .split(",")
        .map((item) => item.trim())
        .filter(Boolean);

      payloadFiles = uniquePaths(files.length ? files : FALLBACK_PAYLOAD);
      if (!payloadFiles.includes(INFO_PATH)) {
        payloadFiles.push(INFO_PATH);
      }

      renderPayload();
      appStatus.textContent = appInfo.name + " " + appInfo.version;
      addLog("Manifest loaded from GitHub.", "ok");
      updateInstallState();
    }

    function useFallbackPayload(error) {
      appInfo = null;
      payloadFiles = FALLBACK_PAYLOAD.slice();
      renderPayload();
      appStatus.textContent = "Using fallback payload";
      if (error) {
        addLog(error.message, "warn");
      }
      updateInstallState();
    }

    function uniquePaths(paths) {
      const seen = new Set();
      const out = [];
      paths.forEach((path) => {
        const clean = path.replace(/\\/g, "/").replace(/^\/+/, "");
        if (clean && !seen.has(clean)) {
          seen.add(clean);
          out.push(clean);
        }
      });
      return out;
    }

    async function selectInstallTarget() {
      if (!("showDirectoryPicker" in window)) {
        addLog("Directory install requires Chrome or Edge with the File System Access API.", "error");
        installStatus.textContent = "Browser unsupported";
        return;
      }

      try {
        targetDirectory = await window.showDirectoryPicker({
          id: "robco-calculator-target",
          mode: "readwrite"
        });
        targetLabel.textContent = targetDirectory.name || "Selected folder";
        installStatus.textContent = "Target selected";
        addLog("Selected target: " + targetLabel.textContent, "ok");
      } catch (error) {
        if (error.name !== "AbortError") {
          addLog(error.message, "error");
        }
      } finally {
        updateInstallState();
      }
    }

    async function installApp() {
      if (busy || !targetDirectory) {
        return;
      }

      try {
        setBusy(true);
        setProgress(0);
        logList.replaceChildren();

        guardTargetDirectory(targetDirectory);
        await ensureWritable(targetDirectory);

        if (!appInfo) {
          try {
            await loadManifest();
          } catch (error) {
            useFallbackPayload(error);
          }
        }

        for (let index = 0; index < payloadFiles.length; index += 1) {
          const path = payloadFiles[index];
          addLog("Downloading " + path + "...");
          const bytes = await downloadFile(path);
          setProgress(((index + 0.45) / payloadFiles.length) * 100);
          await writeFile(targetDirectory, path, bytes);
          setProgress(((index + 1) / payloadFiles.length) * 100);
          addLog("Installed " + path + " (" + bytes.byteLength + " bytes).", "ok");
        }

        installStatus.textContent = "Install complete";
        addLog("Done. Restart or rescan the Pip launcher.", "ok");
      } catch (error) {
        installStatus.textContent = "Install failed";
        addLog(error.message, "error");
      } finally {
        setBusy(false);
        updateInstallState();
      }
    }

    function guardTargetDirectory(directory) {
      const name = String(directory.name || "").toUpperCase();
      if (name === "APPS" || name === "APPINFO") {
        throw new Error("Select the microSD root, not the " + name + " folder.");
      }
    }

    async function ensureWritable(directory) {
      if (!directory.queryPermission || !directory.requestPermission) {
        return;
      }

      let permission = await directory.queryPermission({ mode: "readwrite" });
      if (permission !== "granted") {
        permission = await directory.requestPermission({ mode: "readwrite" });
      }

      if (permission !== "granted") {
        throw new Error("Write permission was not granted.");
      }
    }

    async function downloadFile(path) {
      const response = await fetch(rawUrl(path), { cache: "no-store" });
      if (!response.ok) {
        throw new Error("Download failed for " + path + ": " + response.status + " " + response.statusText);
      }
      return new Uint8Array(await response.arrayBuffer());
    }

    async function writeFile(root, path, bytes) {
      const parts = path.split("/").filter(Boolean);
      if (!parts.length) {
        throw new Error("Invalid payload path: " + path);
      }

      let directory = root;
      for (const part of parts.slice(0, -1)) {
        directory = await directory.getDirectoryHandle(part, { create: true });
      }

      const fileHandle = await directory.getFileHandle(parts[parts.length - 1], { create: true });
      const writable = await fileHandle.createWritable();
      await writable.write(bytes);
      await writable.close();

      const writtenFile = await fileHandle.getFile();
      if (writtenFile.size !== bytes.byteLength) {
        throw new Error("Write verification failed for " + path + ".");
      }
    }

    function setBusy(nextBusy) {
      busy = nextBusy;
      selectTarget.disabled = busy;
      installButton.disabled = busy || !targetDirectory;
      refInput.disabled = busy;
      if (busy) {
        installStatus.textContent = "Installing...";
      }
    }

    function updateInstallState() {
      installButton.disabled = busy || !targetDirectory;
    }

    function setProgress(value) {
      progressBar.style.width = Math.max(0, Math.min(100, value)) + "%";
    }

    function addLog(message, type) {
      const item = document.createElement("li");
      item.textContent = message;
      if (type) {
        item.className = type;
      }
      logList.appendChild(item);
      logList.scrollTop = logList.scrollHeight;
    }
  </script>
</body>
</html>
